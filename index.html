<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gran Carte — Taverna ’e Mare</title>
  <style>
    :root{
      --navy:#0B3D5B;
      --sea:#2E8B7B;
      --gold:#C9A66B;
      --muted:#6b7280;
      --bg:#ffffff;
      --card:#fbfbfb;
      --border:#ececec;
      --text:#0f1724;
      --accent:#0b6b5a;
      --glass: rgba(11,61,91,0.06);
      --maxw:1100px;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none}

    .wrap{max-width:var(--maxw);margin:18px auto;padding:18px;}
    header.site-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:14px;}
    header .brand{display:flex;flex-direction:column;}
    header h1{font-family:"Playfair Display",serif;font-size:30px;color:var(--navy);margin:0;line-height:1;}
    header p{margin:6px 0 0 0;color:var(--muted);font-size:13px;}

    /* Topbar (categorie sempre in alto) */
    .topbar{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:10px 6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:linear-gradient(180deg,var(--card),#fff);
      -webkit-overflow-scrolling:touch;
      margin-bottom:14px;
    }
    .topbar .cat-pill{
      flex:0 0 auto;
      padding:8px 12px;border-radius:999px;background:transparent;border:1px solid transparent;font-weight:700;color:var(--text);
      cursor:pointer;margin-right:8px;
    }
    .topbar .cat-pill.active{background:var(--glass);border-color:var(--border)}

    /* Area contenuti: inizialmente vuota */
    .content-area{
      min-height: 220px; /* spazio vuoto iniziale */
      display:block;
      padding:6px 0;
    }

    /* Card categoria (visibile solo quando selezionata) */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 6px 18px rgba(12,40,60,0.04);
    }
    .card h2{font-family:"Playfair Display",serif;color:var(--navy);font-size:20px;margin:0 0 8px 0;}
    .grid-items{display:flex;flex-direction:column;gap:10px}
    .item{display:flex;justify-content:space-between;gap:12px;padding:10px;border-radius:8px;background:#fff;border:1px solid #f2f2f2;}
    .left{max-width:74%}
    .name{display:block;font-weight:700;color:var(--text)}
    .desc{display:block;color:#4b5563;font-size:14px;margin-top:6px;line-height:1.35}
    .price{white-space:nowrap;color:var(--text);font-weight:700}
    .price small{font-weight:500;color:var(--muted);font-size:13px}

    .note{font-size:13px;color:#374151;margin-top:10px}
    .allergens{font-size:13px;color:#374151;margin-top:14px;padding-top:12px;border-top:1px dashed #eee}

    /* Bottone fisso in fondo "Torna alle categorie" */
    .back-cats{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:14px;
      background:var(--navy);
      color:#fff;
      padding:10px 16px;
      border-radius:999px;
      font-weight:800;
      border:0;
      cursor:pointer;
      box-shadow:0 8px 26px rgba(11,61,91,0.12);
      z-index:1200;
      display:none; /* visibile solo quando una categoria è aperta */
    }

    /* Responsive */
    @media (max-width:520px){
      header h1{font-size:20px}
      .name{font-size:15px}
      .desc{font-size:13px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <div class="brand">
        <h1>Gran Carte</h1>
        <p class="muted">Taverna ’e Mare — Carta completa</p>
      </div>
      <div style="margin-left:auto" class="muted">Taverna ’e Mare</div>
    </header>

    <!-- Topbar: categorie visibili solo qui -->
    <div class="topbar" id="topbar" role="tablist" aria-label="Categorie menu orizzontali">
      <button class="cat-pill" data-target="le-ostriche">Le Ostriche</button>
      <button class="cat-pill" data-target="le-nostre-selezioni">Le Nostre Selezioni</button>
      <button class="cat-pill" data-target="i-crudi">I Crudi</button>
      <button class="cat-pill" data-target="innovazione-tradizione">Innovazione e tradizione</button>
      <button class="cat-pill" data-target="i-crostacei">I Crostacei</button>
      <button class="cat-pill" data-target="i-nostri-sfizi">I nostri sfizi</button>
      <button class="cat-pill" data-target="primi-piatti">Primi piatti</button>
      <button class="cat-pill" data-target="i-secondi">I Secondi</button>
      <button class="cat-pill" data-target="il-barbecue">Il Barbecue</button>
      <button class="cat-pill" data-target="i-contorni">I Contorni</button>
      <button class="cat-pill" data-target="dessert">Dessert e Coccole Finali</button>
      <button class="cat-pill" data-target="allergeni">Allergeni</button>
    </div>

    <!-- Area contenuti: inizialmente vuota (l'utente vede solo la topbar) -->
    <main class="content-area" id="contentArea" aria-live="polite">
      <!-- Qui verrà mostrata solo la categoria selezionata -->
    </main>
  </div>

  <!-- Bottone fisso per tornare alle categorie -->
  <button class="back-cats" id="backCatsBtn" aria-hidden="true">Torna alle categorie</button>

  <template id="tpl-le-ostriche">
    <section class="card" id="le-ostriche-card" role="region" aria-labelledby="h-ostriche">
      <h2 id="h-ostriche">Le Ostriche</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Ostrica Regal (Irlanda – calibro 3)</span></div><div class="price">6 €</div></div>
        <div class="item"><div class="left"><span class="name">Ostrica Tarbouriech (Italia, Sacca Scardovari – calibro 4)</span></div><div class="price">8 €</div></div>
        <div class="item"><div class="left"><span class="name">Ostrica Royale David Hervet (Francia calibro 4)</span></div><div class="price">6 €</div></div>
        <div class="item"><div class="left"><span class="name">Ostrica Bora (Italia, Sardegna calibro 3)</span></div><div class="price">6 €</div></div>
      </div>
    </section>
  </template>

  <template id="tpl-le-nostre-selezioni">
    <section class="card" id="le-nostre-selezioni-card" role="region" aria-labelledby="h-selezioni">
      <h2 id="h-selezioni">Le Nostre Selezioni</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Caviale Caviar Black Siberian 10gr</span></div><div class="price">30 €</div></div>
        <div class="item"><div class="left"><span class="name">Selezione di Crostacei (crudi, gratinati o al barbecue)</span><span class="desc">€ 14 per 100gr</span></div><div class="price">14 € <small>/ 100 g</small></div></div>
        <div class="item"><div class="left"><span class="name">Noci di mare (taratufi)</span><span class="desc">€ 3 al pz</span></div><div class="price">3 €</div></div>
      </div>
    </section>
  </template>

  <template id="tpl-i-crudi">
    <section class="card" id="i-crudi-card" role="region" aria-labelledby="h-crudi">
      <h2 id="h-crudi">I Crudi</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Il Gran Crudo</span><span class="desc">Selezione di carpacci, tartare e sashimi</span></div><div class="price">45 €</div></div>
        <div class="item"><div class="left"><span class="name">La Tartara</span><span class="desc">Tartara di tonno, zest di limone, finto caviale di tapioca e olive disidratate</span></div><div class="price">20 €</div></div>
        <div class="item"><div class="left"><span class="name">Tartara di Ricciola</span><span class="desc">Tartara di ricciola , stracotto di pomodoro San Marzano, la sua acqua e olio al basilico</span></div><div class="price">20 €</div></div>

        <div class="item"><div class="left"><span class="name">Il Carpaccio</span><span class="desc">Battuto di gambero rosso del golfo, caciottina al limone, insalatina di frutti rossi</span></div><div class="price">18 €</div></div>

  <template id="tpl-innovazione-tradizione">

      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Fettuccine di calamaro</span><span class="desc">Crudo di gamberi , coulis di pomodoro e basilico</span></div><div class="price">22 €</div></div>
        <div class="item"><div class="left"><span class="name">La Triglia</span><span class="desc">Sandwich di triglia, salsa beurre blanc e olio al basilico</span></div><div class="price">18 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Giardino Marino</span><span class="desc">Insalatina di molluschi e crostacei cotti a bassa temperatura e frutti di mare</span></div><div class="price">24 €</div></div>
        <div class="item"><div class="left"><span class="name">Polpo Partenopeo</span><span class="desc">Tentacolo di polpo in due cotture, carpaccio di pomodoro cuor di bue, porro al barbecue, riduzione di aceto di lamponi e mandorle tostate*</span></div><div class="price">18 €</div></div>
        <div class="item"><div class="left"><span class="name">La Tempura</span><span class="desc">Zeppola di baccala, riduzione di lamponi fermentati</span></div><div class="price">18 €</div></div>

  <template id="tpl-i-crostacei">

        <div class="item"><div class="left"><span class="name">Aragosta del Golfo (al Kg)</span></div><div class="price">180 €</div></div>

        <div class="item"><div class="left"><span class="name">Astice Canada (al Kg)</span></div><div class="price">100 €</div></div>

  <template id="tpl-i-nostri-sfizi">

      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Alici del Cantabrico</span><span class="desc">French toast con alici del Cantabrico, lattecotto affumicato</span></div><div class="price">20 €</div></div>
        <div class="item"><div class="left"><span class="name">Speck di tonno</span><span class="desc">Pan brioche con ventresca di tonno, pomodorini semi dry e zest di limone</span></div><div class="price">20 €</div></div>

        <div class="item"><div class="left"><span class="name">Essenza Marina</span><span class="desc">Spaghettini al quinto quarto di seppia ed il suo lardo</span></div><div class="price">20 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Risotto</span><span class="desc">Versione di risotto alla pescatora</span></div><div class="price">22 €</div></div>
        <div class="item"><div class="left"><span class="name">Tajarin</span><span class="desc">Tagliolino mantecato al parmigiano, tartufo estivo e crudo di gamberi</span></div><div class="price">25 €</div></div>

  <template id="tpl-i-secondi">
    <section class="card" id="i-secondi-card" role="region" aria-labelledby="h-secondi">
      <h2 id="h-secondi">I Secondi</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Come una Carne</span><span class="desc">Chateaubriand di tonno rosso con fondente di patate al tartufo (per 2 persone)</span></div><div class="price">50 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Trancio</span><span class="desc">Rollatina di spigola, asparagi, fior di latte di Agerola, patata pavè e salsa bourre blanc al basilico</span></div><div class="price">22 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Nostro Fritto</span><span class="desc">Gamberi, calamari, baccalà e alici,insalatina di misticanza finocchi e arancia*</span></div><div class="price">22 €</div></div>

      </div>
    </section>
  </template>

  <template id="tpl-il-barbecue">
    <section class="card" id="il-barbecue-card" role="region" aria-labelledby="h-barbecue">
      <h2 id="h-barbecue">Il Barbecue</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Il Tonno</span><span class="desc">Tagliata di tonno</span></div><div class="price">20 €</div></div>
        <div class="item"><div class="left"><span class="name">Pescato al Barbecue (al Kg)</span></div><div class="price">70 €</div></div>
      </div>
    </section>
  </template>

  <template id="tpl-i-contorni">

      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Insalatina di pomodori, cetrioli, olive taggiasche e cipollotto</span></div><div class="price">8 €</div></div>
        <div class="item"><div class="left"><span class="name">Insalatina di misticanza, finocchi e arancia</span></div><div class="price">6 €</div></div>
        <div class="item"><div class="left"><span class="name">Carciofi al salto con olive taggiasche</span></div><div class="price">8 €</div></div>
        <div class="item"><div class="left"><span class="name">Patate al forno</span></div><div class="price">8 €</div></div>
      </div>
    </section>
  </template>

  <template id="tpl-dessert">
    <section class="card" id="dessert-card" role="region" aria-labelledby="h-dessert">
      <h2 id="h-dessert">Dessert e Coccole Finali</h2>
      <div class="grid-items">
        <div class="item"><div class="left"><span class="name">Selezione di formaggi</span><span class="desc">Erborinati media e lunga stagionatura con confetture</span></div><div class="price">18 €</div></div>
        <div class="item"><div class="left"><span class="name">Soufflè</span><span class="desc">Agli agrumi con gelato allo yogurt e crumble al cioccolato bianco</span><span class="desc"><em>da comunicare all’inizio dell’ordinazione</em></span></div><div class="price">12 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Babà</span><span class="desc">Savarin con crema inglese e frutti rossi</span></div><div class="price">12 €</div></div>
        <div class="item"><div class="left"><span class="name">La Crostata</span><span class="desc">Sable con crema chantilly al limone, lemon curd, namelaka al cioccolato bianco</span></div><div class="price">12 €</div></div>
        <div class="item"><div class="left"><span class="name">Innovazione</span><span class="desc">Quenelle al cioccolato fondente 70%, namelaka alla mandorla</span></div><div class="price">12 €</div></div>
        <div class="item"><div class="left"><span class="name">Il Tiramisù</span><span class="desc">Pate à bombe al tiramisu con gelato al caffè</span></div><div class="price">12 €</div></div>
        <div class="item"><div class="left"><span class="name">Mousse di ricotta e pera</span><span class="desc">Croccante alla nocciola , pere disidratate e cioccolato fondente 70%</span></div><div class="price">12 €</div></div>
      </div>
    </section>
  </template>

  <template id="tpl-allergeni">
    <section class="card" id="allergeni-card" role="region" aria-labelledby="h-allergeni">
      <h2 id="h-allergeni">Allergeni</h2>
      <div class="allergens">
        <p>Si prega di comunicare eventuali intolleranze e/o allergie al personale di sala.</p>
        <p>Per qualsiasi informazione sui prodotti serviti è possibile consultare la seguente tabella degli allergeni:</p>
        <ol>
          <li>1 – CEREALI CONTENENTI GLUTINE (grano, segale, orzo, avena, farro, kamut o i loro ceppi ibridati) e prodotti derivati</li>
          <li>2 – CROSTACEI E DERIVATI (marini e d’acqua dolce: gamberi, scampi, granchi e simili)</li>
          <li>3 – UOVA E DERIVATI (maionese, emulsionanti, pasta all’uovo)</li>
          <li>4- PESCE E DERIVATI (anche in piccole percentuali)</li>
          <li>5 – ARACHIDI E DERIVATI (creme e condimenti in cui vi sia anche in minima dosi)</li>
          <li>6 – SOIA E DERIVATI (latte di soia, tofu, spaghetti di soia e simili)</li>
          <li>7 – LATTE E DERIVATI (yogurt, biscotti, torte, gelati e creme varie)</li>
          <li>8 – FRUTTA A GUSCIO E DERIVATI (mandorle, nocciole, noci comuni, noci di acagiù, noci pecan, anacardi, pistacchi)</li>
          <li>9 – SEDANO E DERIVATI (sia in pezzi che all’interno di preparati per zuppe, salse e concentrati vegetali)</li>
          <li>10 – SENAPE E DERIVATI (si può trovare in salse e condimenti, specie nella mostarda)</li>
          <li>11 – SEMI DI SESAMO E DERIVATI (semi interi usati per il pane, farine che lo contengono anche minima percentuale)</li>
          <li>12 – ANIDRIDE SOLFOROSA E SOLFITI (in concentrazioni superiori a 10 mg/kg o 10 mg/l espressi come SO2)</li>
          <li>13 – LUPINI E DERIVATI (presenti in cibi vegan sottoforma di arrosti, salamini, farine e similari)</li>
          <li>14 – MOLLUSCHI E DERIVATI (canestrelli, cannolicchi, capesante, cozze, ostriche, patelle, vongole, telline ecc.)</li>
        </ol>
      </div>
    </section>
  </template>

  <script>
    const contentArea = document.getElementById('contentArea');
    const topPills = Array.from(document.querySelectorAll('.cat-pill'));
    const backBtn = document.getElementById('backCatsBtn');

    // Mappa id categoria -> template id
    const tplMap = {
      'le-ostriche': 'tpl-le-ostriche',
      'le-nostre-selezioni': 'tpl-le-nostre-selezioni',
      'i-crudi': 'tpl-i-crudi',
      'innovazione-tradizione': 'tpl-innovazione-tradizione',
      'i-crostacei': 'tpl-i-crostacei',
      'i-nostri-sfizi': 'tpl-i-nostri-sfizi',
      'primi-piatti': 'tpl-primi-piatti',
      'i-secondi': 'tpl-i-secondi',
      'il-barbecue': 'tpl-il-barbecue',
      'i-contorni': 'tpl-i-contorni',
      'dessert': 'tpl-dessert',
      'allergeni': 'tpl-allergeni'
    };

    // Mostra solo la categoria selezionata: svuota area e inserisce template corrispondente
    function showCategory(catId){
      const tplId = tplMap[catId];
      if(!tplId) return;
      // pulisci area
      contentArea.innerHTML = '';
      // clona template
      const tpl = document.getElementById(tplId);
      if(!tpl) return;
      const clone = tpl.content.cloneNode(true);
      contentArea.appendChild(clone);
      // mostra back button
      backBtn.style.display = 'block';
      backBtn.setAttribute('aria-hidden','false');
      // evidenzia pill attiva
      topPills.forEach(p => p.classList.toggle('active', p.dataset.target === catId));
      // scroll to content
      setTimeout(()=> contentArea.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }

    // Torna alla vista categorie: svuota area e nasconde back button
    function showCategoriesView(){
      contentArea.innerHTML = ''; // area vuota: l'utente vede solo la topbar
      backBtn.style.display = 'none';
      backBtn.setAttribute('aria-hidden','true');
      topPills.forEach(p => p.classList.remove('active'));
      // scroll top
      window.scrollTo({top:0, behavior:'smooth'});
    }

    // Eventi sulle pill
    topPills.forEach(pill=>{
      pill.addEventListener('click', ()=>{
        const id = pill.dataset.target;
        showCategory(id);
      });
      pill.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          pill.click();
        }
      });
    });

    // Back button
    backBtn.addEventListener('click', showCategoriesView);

    // Deep-linking: se hash presente apri quella categoria
    (function(){
      const hash = location.hash.replace('#','');
      if(hash && tplMap[hash]){
        // apri categoria corrispondente
        showCategory(hash);
      } else {
        // vista iniziale: solo topbar, area vuota
        showCategoriesView();
      }
    })();

    // Accessibilità: ESC torna alle categorie
    document.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape') showCategoriesView();
    });
  </script>
</body>
</html>
